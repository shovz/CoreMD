AWSTemplateFormatVersion: '2010-09-09'
Description: CoreMD frontend - S3 bucket + CloudFront distribution (with EC2 API proxy)

Parameters:
  BackendHostname:
    Type: String
    Description: EC2 public DNS hostname (e.g. ec2-1-2-3-4.eu-central-1.compute.amazonaws.com)

Resources:

  SPARoutingFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-spa-routing"
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite SPA routes to index.html (scoped to S3 default behavior only)
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
            var request = event.request;
            var uri = request.uri;
            var filename = uri.split('/').pop();
            if (filename && filename.indexOf('.') !== -1) {
                return request;
            }
            request.uri = '/index.html';
            return request;
        }

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
          - Id: EC2Origin
            DomainName: !Ref BackendHostname
            CustomOriginConfig:
              HTTPPort: 8000
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD]
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SPARoutingFunction.FunctionMetadata.FunctionARN
        CacheBehaviors:
          - PathPattern: /api/v1/*
            TargetOriginId: EC2Origin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
          - PathPattern: /static/*
            TargetOriginId: EC2Origin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            AllowedMethods: [GET, HEAD]

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

Outputs:
  BucketName:
    Value: !Ref FrontendBucket
    Description: S3 bucket name - pass to deploy_frontend.sh
  CloudFrontDomain:
    Value: !Sub "https://${Distribution.DomainName}"
    Description: Your app URL - open this in the browser
  DistributionId:
    Value: !Ref Distribution
    Description: CloudFront distribution ID - pass to deploy_frontend.sh
