AWSTemplateFormatVersion: '2010-09-09'
Description: CoreMD backend - EC2 t3.micro + Elastic IP

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of your EC2 key pair (e.g. coremd-key)

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Resources:

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: CoreMD backend - allow SSH and API
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      SecurityGroups:
        - !Ref SecurityGroup
      ImageId: !Ref LatestAmiId
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y git docker
          systemctl enable docker
          systemctl start docker
          usermod -aG docker ec2-user
          mkdir -p /usr/lib/docker/cli-plugins
          curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
            -o /usr/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/lib/docker/cli-plugins/docker-compose

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref Instance

Outputs:
  PublicIP:
    Value: !Ref ElasticIP
    Description: EC2 public IP - use this in all deploy scripts and as VITE_API_URL host
  InstanceId:
    Value: !Ref Instance
    Description: EC2 instance ID
