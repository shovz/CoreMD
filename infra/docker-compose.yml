version: "3.9"

services:
  backend:
    build: ../backend
    container_name: coreMD-backend
    ports:
      - "8000:8000"
    env_file:
      - env/.env.development
    depends_on:
      - mongo
      - redis


  frontend:
    build: ../frontend
    container_name: coreMD-frontend
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true

  mongo:
    image: mongo:6
    container_name: coreMD-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: coreMD-redis
    ports:
      - "6379:6379"

volumes:
  mongo_data:
