version: "3.9"

services:
  backend:
    build: ../backend
    container_name: coreMD-backend
    ports:
      - "8000:8000"
    env_file:
      - env/.env.development
    volumes:
      - ../backend/static:/app/static
    depends_on:
      - mongo
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_URL: http://localhost:8000/api/v1
    container_name: coreMD-frontend
    ports:
      - "5173:80"

  mongo:
    image: mongo:6
    container_name: coreMD-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7
    container_name: coreMD-redis
    ports:
      - "6379:6379"

volumes:
  mongo_data:
